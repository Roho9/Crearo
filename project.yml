# XcodeGen spec — generates Crearo.xcodeproj reproducibly (no merge conflicts on the project file).
# Run:  xcodegen generate   (then `open Crearo.xcodeproj`). See docs/SETUP_GUIDE.md §3.

name: Crearo
options:
  bundleIdPrefix: com.yourstudio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  CrearoCore:
    path: CrearoCore

targets:
  CrearoApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CrearoApp
        excludes:
          - "Resources/Info.plist"
          - "Resources/*.xcconfig"
    dependencies:
      - package: CrearoCore
        product: CrearoCore
    # Backend config comes from an xcconfig. Copy Config.example.xcconfig → Config.xcconfig
    # (gitignored) and point these at it for real secrets. The example is referenced by default
    # so `xcodegen generate` works out of the box (app runs offline with placeholder values).
    configFiles:
      Debug: CrearoApp/Resources/Config.example.xcconfig
      Release: CrearoApp/Resources/Config.example.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourstudio.crearo
        INFOPLIST_FILE: CrearoApp/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic

  CrearoAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CrearoAppTests
        optional: true
    dependencies:
      - target: CrearoApp

schemes:
  CrearoApp:
    build:
      targets:
        CrearoApp: all
    test:
      targets:
        - CrearoAppTests
